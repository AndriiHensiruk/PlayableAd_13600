<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>PlayableAd_13600</title>
  <style>
    body, html { 
      margin: 0; padding: 0; 
      width: 100%; height: 100%; 
      background: #000; 
      overflow: hidden; 
      user-select: none; 
      -webkit-user-select: none;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    #game { 
      position: relative; 
      width: 100vw; 
      height: 177.78vw; 
      max-height: 100vh; 
      max-width: 56.25vh; 
      aspect-ratio: 9 / 16;
      box-shadow: 0 0 30px rgba(0,0,0,0.8);
      overflow: hidden; 
    }

    .scene { width:100%; height:100%; position:absolute; top:0; left:0; display:none; }
    .active { display:block; }

    /* --- КЕРУВАННЯ ФОНОМ --- */
    .background {
      position: absolute; 
      top: -10%; left: -10%; 
      width: 120%; height: 120%;
      background: url("assets/bg.webp") center/cover no-repeat;
      animation: engineIdle 0.15s linear infinite;
      z-index: 0;
      transition: filter 0.5s ease-in-out;
    }

    @keyframes engineIdle {
      0%   { transform: translate(0, 0); }
      50%  { transform: translate(0, 1.5px); }
      100% { transform: translate(0, 0); }
    }

    .background.final-blur,
    .girl-container.final-blur {
      filter: blur(5px) brightness(0.6);
    }

    /* --- КОНТЕЙНЕР ДІВЧИНИ (АДАПТИВНИЙ) --- */
    .girl-container {
      position: absolute;
      bottom: 0; left: 50%;
      transform: translateX(-50%);
      width: 100%; height: 100%;
      pointer-events: none;
      transition: filter 0.5s ease-in-out;
    }

    .girl-container img {
      position: absolute;
      bottom: -30%; left: 50%;
      transform: translateX(-50%);
      width: 110%; 
      max-height: 110%;
      object-fit: contain;
      opacity: 0;
      transition: opacity 0.15s ease-in-out; 
    }

    .girl-container img.visible {
      opacity: 1;
    }

    .girl-container.bump-active {
      animation: girlBumpEffect 0.85s cubic-bezier(0.25, 1, 0.5, 1.2) forwards;
    }

    @keyframes girlBumpEffect {
      0%   { transform: translate(-50%, 0); }
      20%  { transform: translate(-50%, -9.5%); } 
      40%  { transform: translate(-50%, -10%); }  
      68%  { transform: translate(-50%, 0.8%); }   
      82%  { transform: translate(-50%, -1.5%); } 
      92%  { transform: translate(-50%, 0.3%); }
      100% { transform: translate(-50%, 0); }
    }

    .background.bump-active {
      animation: bgBumpEffect 0.85s cubic-bezier(0.25, 1, 0.5, 1.2) forwards;
    }

    @keyframes bgBumpEffect {
      0%   { transform: translate(0, 0) scale(1); }
      20%  { transform: translate(2%, 9%) scale(1.02); }  
      40%  { transform: translate(2%, 9.5%) scale(1.02); }
      68%  { transform: translate(-0.5%, -1%) scale(0.99); } 
      82%  { transform: translate(0, 0.5%) scale(1); }  
      100% { transform: translate(0, 0) scale(1); }
    }

    /* --- КНОПКА ЗВУКУ (MUTE) --- */
    .mute-btn {
      position: absolute;
      top: 20px;
      right: 20px;
      width: 40px;
      height: 40px;
      cursor: pointer;
      z-index: 30;
      background: rgba(0, 0, 0, 0.5);
      border-radius: 50%;
      display: flex;
      justify-content: center;
      align-items: center;
      box-shadow: 0 0 10px rgba(0,0,0,0.5);
      transition: transform 0.2s ease;
    }
    .mute-btn:active {
      transform: scale(0.9);
    }
    .mute-btn svg {
      width: 24px;
      height: 24px;
      fill: #fff;
    }

    /* --- СУБТИТРИ --- */
    .subtitles-container {
      position: absolute;
      top: 10%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: 95%;
      text-align: center;
      z-index: 15;
      pointer-events: none;
    }

    .subtitle-text {
      font-family: 'Arial Black', 'Impact', sans-serif;
      font-size: 5.6 vw;
      color: #fff;
      text-transform: uppercase;
      letter-spacing: 1px;
      white-space: nowrap;
      text-shadow: 
        -3px -3px 0 #000,  
         3px -3px 0 #000,
        -3px  3px 0 #000,
         3px  3px 0 #000,
         0px  4px 10px rgba(0,0,0,0.8);
      opacity: 0;
      transform: scale(0.7);
      transition: opacity 0.2s ease, transform 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    }

    @media (min-height: 56.25vh) {
      .subtitle-text { font-size: 3.2vh; }
    }

    .subtitle-text.show {
      opacity: 1;
      transform: scale(1);
    }

    /* --- АДАПТИВНІ КНОПКИ --- */
    .btn { 
      position: absolute; bottom: 30%; left: 50%; transform: translateX(-50%);
      cursor: pointer; width: 50%; height: auto; 
      max-width: 350px;
      transition: transform 0.2s ease, filter 0.2s ease, opacity 1s ease; 
      z-index: 10; 
    }

    #playBtn { animation: pulse 1.5s infinite; }
    @keyframes pulse {
      0% { transform: translateX(-50%) scale(1); opacity: 1; }
      50% { transform: translateX(-50%) scale(1.1); opacity: 0.85; }
      100% { transform: translateX(-50%) scale(1); opacity: 1; }
    }

    #goBtn { 
      position: absolute;
      bottom: 25%; 
      left: 50%; 
      transform: translateX(-50%) scale(0.5); 
      width: 65%; 
      max-width: 320px; 
      opacity: 0; 
      pointer-events: none;
      transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275), opacity 0.3s ease;
      z-index: 20;
    }
    #goBtn.show { 
      opacity: 1; 
      pointer-events: auto; 
      transform: translateX(-50%) scale(1); 
      animation: finalPulse 1.5s infinite alternate ease-in-out;
    }
    @keyframes finalPulse {
      0% { transform: translateX(-50%) scale(1); }
      100% { transform: translateX(-50%) scale(1.06); filter: drop-shadow(0 0 15px gold); }
    }
    #mainBtn {
      position: absolute; bottom: 10%; left: 50%; transform: translateX(-50%);
      cursor: pointer; width: 35%; height: auto;
      max-width: 150px;
      transition: transform 0.2s ease, filter 0.2s ease, opacity 0.3s ease;
      z-index: 10;
    }

    .pulse-glow {
      animation: glowBlink 2s infinite !important;
    }

    @keyframes glowBlink {
      0%   { filter: drop-shadow(0 0 5px gold); }
      50%  { filter: drop-shadow(0 0 15px gold); }
      100% { filter: drop-shadow(0 0 5px gold); }
    }

    #mainBtn:active {
      transform: translateX(-50%) scale(0.9);
      filter: brightness(0.8) drop-shadow(0 0 5px orange) !important;
    }

    /* --- ЕФЕКТИ --- */
    .buttonParticle {
      position: absolute;
      width: 4vw; height: 4vw;
      max-width: 18px; max-height: 18px;
      background: #222;
      border-radius: 50%;
      border: 2px solid #444;
      box-shadow: inset 0 0 5px #000, 0 2px 5px rgba(0,0,0,0.5);
      animation: shootLeft 0.7s cubic-bezier(0.25, 1, 0.5, 1) forwards;
      z-index: 5;
    }
    @keyframes shootLeft {
      0%   { transform: translate(-50%, -50%) scale(1) rotate(0deg); opacity: 1; }
      100% { transform: translate(-35vw, -15vw) scale(0.7) rotate(-360deg); opacity: 0; }
    }

    .spark {
      position: absolute;
      width: 3vw; height: 3vw;
      max-width: 14px; max-height: 14px;
      background: radial-gradient(circle, #fff 20%, gold 60%, transparent 100%);
      border-radius: 50%;
      filter: drop-shadow(0 0 6px gold);
      animation: sparkExplode 0.6s cubic-bezier(0.1, 0.8, 0.3, 1) forwards;
      z-index: 6;
    }
    @keyframes sparkExplode {
      0%   { transform: scale(0.3) translate(0,0); opacity: 1; }
      15%  { opacity: 1; } 
      100% { transform: scale(1) translate(var(--x), var(--y)); opacity: 0; }
    }

    #splash img[src*="title.png"] {
      width: 70%; height: auto;
      max-width: 350px;
    }
  </style>
</head>
<body>

  <div id="game">

    <div id="muteBtn" class="mute-btn">
      <svg id="muteIcon" viewBox="0 0 24 24">
        <path d="M3 9v6h4l5 5V4L7 9H3zm13.5 3c0-1.77-1.02-3.29-2.5-4.03v8.05c1.48-.73 2.5-2.25 2.5-4.02zM14 3.23v2.06c2.89.86 5 3.54 5 6.71s-2.11 5.85-5 6.71v2.06c4.01-.91 7-4.49 7-8.77s-2.99-7.86-7-8.77z"/>
      </svg>
    </div>

    <div id="splash" class="scene active">
      <div class="background" style="filter:blur(5px) brightness(0.6);"></div>
      <img src="assets/girl1.webp" style="position:absolute; 
        bottom:-30%; 
        left:50%; 
        transform:translateX(-50%); 
        width:110%; 
        max-height:110%; 
        object-fit:contain; filter:blur(5px) brightness(0.6);">      
      <img src="assets/play_btn.webp" id="playBtn" class="btn">
    </div>

    <div id="gameScene" class="scene">
      <div class="background"></div>
      
      <div id="girlContainer" class="girl-container">
        <img id="g1" src="assets/girl1.webp" class="visible">
        <img id="g1_j" src="assets/girl1_jump.webp">
        <img id="g2" src="assets/girl2.webp">
        <img id="g2_j" src="assets/girl2_jump.webp">
        <img id="g3" src="assets/girl3.webp">
        <img id="g3_j" src="assets/girl3_jump.webp">
        <img id="g_final" src="assets/girl_final.webp">
      </div>

      <div class="subtitles-container">
        <div id="subtitle" class="subtitle-text"></div>
      </div>

      <img src="assets/main_btn.png" id="mainBtn" class="btn pulse-glow">
      <img src="assets/go_btn.png" id="goBtn">
    </div>
  </div>

  <audio id="bgMusic" src="assets/bg_music.m4a" loop></audio>
  <audio id="shout1" src="assets/shout1.m4a"></audio>
  <audio id="shout2" src="assets/shout2.m4a"></audio>
  <audio id="shout3" src="assets/shout3.m4a"></audio>
  <audio id="finalShout" src="assets/final.m4a"></audio>
  <audio id="buttonSound" src="assets/button.m4a"></audio>

  <script>
    const splash = document.getElementById('splash');
    const gameScene = document.getElementById('gameScene');
    const playBtn = document.getElementById('playBtn');
    const mainBtn = document.getElementById('mainBtn');
    const goBtn = document.getElementById('goBtn');
    const muteBtn = document.getElementById('muteBtn');
    const muteIcon = document.getElementById('muteIcon');
    const girlContainer = document.getElementById('girlContainer');
    const gameBg = gameScene.querySelector('.background');
    const subtitleEl = document.getElementById('subtitle');

    const bgMusic = document.getElementById('bgMusic');
    const shouts = [document.getElementById('shout1'),
                    document.getElementById('shout2'),
                    document.getElementById('shout3')];
    const finalShout = document.getElementById('finalShout');
    const buttonSound = document.getElementById('buttonSound');

    // субтитри
    const subtitleTexts = [
      "Don't press that button!",
      "Wait... no, don't press it!",
      "Please... don't press it!"
    ];

    let clickCount = 0; 
    let subtitleTimeout;
    let isMuted = false;

    // SVG шляхи іконок (Звук є / Звуку немає)
    const iconSoundOn = 'M3 9v6h4l5 5V4L7 9H3zm13.5 3c0-1.77-1.02-3.29-2.5-4.03v8.05c1.48-.73 2.5-2.25 2.5-4.02zM14 3.23v2.06c2.89.86 5 3.54 5 6.71s-2.11 5.85-5 6.71v2.06c4.01-.91 7-4.49 7-8.77s-2.99-7.86-7-8.77z';
    const iconSoundOff = 'M16.5 12c0-1.77-1.02-3.29-2.5-4.03v2.21l2.45 2.45c.03-.21.05-.42.05-.63zm2.5 0c0 .94-.2 1.82-.54 2.64l1.51 1.51C20.63 14.91 21 13.5 21 12c0-4.28-2.99-7.86-7-8.77v2.06c2.89.86 5 3.54 5 6.71zM4.27 3L3 4.27 7.73 9H3v6h4l5 5v-6.73l4.25 4.25c-.67.52-1.42.93-2.25 1.18v2.06c1.38-.31 2.63-.95 3.69-1.81L19.73 21 21 19.73l-9-9L4.27 3zM12 4L9.91 6.09 12 8.18V4z';

    function showSubtitle(text) {
      clearTimeout(subtitleTimeout);
      subtitleEl.textContent = text;
      subtitleEl.classList.add('show');
      
      subtitleTimeout = setTimeout(() => {
        subtitleEl.classList.remove('show');
      }, 1500);
    }

    function switchGirlImage(nextId) {
      const current = girlContainer.querySelector('.visible');
      const next = document.getElementById(nextId);
      if (current) current.classList.remove('visible');
      if (next) next.classList.add('visible');
    }

    // ОБРОБНИК КНОПКИ MUTE
    muteBtn.addEventListener('click', () => {
      isMuted = !isMuted;
      
      bgMusic.muted = isMuted;
      buttonSound.muted = isMuted;
      finalShout.muted = isMuted;
      shouts.forEach(shout => shout.muted = isMuted);

      muteIcon.querySelector('path').setAttribute('d', isMuted ? iconSoundOff : iconSoundOn);
    });

    // СТАРТ ГРИ
    playBtn.addEventListener('click', () => {
      splash.classList.remove('active');
      gameScene.classList.add('active');
      bgMusic.volume = 0.1;
      bgMusic.play().catch(err => console.log("Music autoplay blocked"));

      shouts[0].play().catch(err => console.log("Audio play blocked"));
      showSubtitle(subtitleTexts[0]);
    });

    mainBtn.addEventListener('click', () => {
      if (clickCount >= 3) return; // Рівно 3 натиски

      buttonSound.play();
      
      mainBtn.style.pointerEvents = "none"; 
      mainBtn.style.opacity = "0";
      mainBtn.classList.remove('pulse-glow');

      girlContainer.classList.add('bump-active');
      gameBg.classList.add('bump-active');
      
      switchGirlImage(`g${clickCount + 1}_j`);

      setTimeout(() => {
        const containerWidth = gameScene.offsetWidth;

        const button = document.createElement('div');
        button.className = 'buttonParticle';
        button.style.left = '51%';
        button.style.top = '68%';
        gameScene.appendChild(button);
        setTimeout(() => button.remove(), 700);

        const particleCount = 25; 
        for (let i = 0; i < particleCount; i++) {
          const spark = document.createElement('div');
          spark.className = 'spark';
          spark.style.left = '51%';
          spark.style.top = '68%';
          
          const angle = Math.random() * Math.PI * 2;
          const distance = (containerWidth * 0.1) + Math.random() * (containerWidth * 0.3); 
          const x = Math.cos(angle) * distance;
          const y = Math.sin(angle) * distance;

          spark.style.setProperty('--x', `${x}px`);
          spark.style.setProperty('--y', `${y}px`);
          gameScene.appendChild(spark);
          setTimeout(() => spark.remove(), 600);
        }

        // Логіка перемикання кроків
        if (clickCount === 0) {
          shouts[1].play();
          showSubtitle(subtitleTexts[1]);
          switchGirlImage('g2');
          clickCount++;
        } else if (clickCount === 1) {
          shouts[2].play();
          showSubtitle(subtitleTexts[2]);
          switchGirlImage('g3');
          clickCount++;
        } else if (clickCount === 2) {
          finalShout.play(); 
          switchGirlImage('g_final'); 

          girlContainer.classList.add('final-blur');
          gameBg.classList.add('final-blur');
          goBtn.classList.add("show");
          clickCount++;
        }

      }, 340); 

      setTimeout(() => {
        girlContainer.classList.remove('bump-active');
        gameBg.classList.remove('bump-active');

        if (clickCount < 3) {
          mainBtn.style.opacity = "1";
          mainBtn.style.pointerEvents = "auto";
          mainBtn.classList.add('pulse-glow');
        }
      }, 850); 
    });

    goBtn.addEventListener('click', () => {
      window.location.href = "https://yourgame.com";
    });
  </script>
</body>
</html>
